models:
  - name: gen_koodi
    description: Koodiston tiedot
    columns:
      - name: versioitu_koodiuri
        data_type: text
      - name: koodistouri
        data_type: text
      - name: koodiuri
        data_type: text
      - name: koodiarvo
        data_type: text
      - name: koodiversio
        data_type: integer
      - name: nimi_fi
        data_type: text
      - name: nimi_sv
        data_type: text
      - name: nimi_en
        data_type: text
      - name: tila
        data_type: text
      - name: voimassaalkupvm
        data_type: timestamp with time zone
      - name: voimassaloppupvm
        data_type: timestamp with time zone

  - name: gen_koodirelaatio
    description: Koodiston relaation tietoja
    columns:
      - name: versioitu_alakoodiuri
        data_type: text
      - name: versioitu_ylakoodiuri
        data_type: text
      - name: relaatiotyyppi
        data_type: text
      - name: relaatioversio
        data_type: integer
      - name: alakoodiuri
        data_type: text
      - name: alakoodiversio
        data_type: integer
      - name: ylakoodiuri
        data_type: text
      - name: ylakoodiversio
        data_type: integer

  - name: gen_ohjausparameter
    description: Hakujen ohjausparametreja
    columns:
      - name: hakuoid_avain_id
        data_type: text
        data_tests:
          - dbt_constraints.primary_key
      - name: haku_oid
        description: Haun tunniste
        data_type: text
      - name: avain
        description: parametrin avain
        data_type: text
      - name: alkuperainen_arvo
        description: Parametrin alkuperäinen arvo, tämä voi olla myös nested JSON jollon data on alemmalla tasolla
        data_type: jsonb
      - name: aikaleima
        description: jos sisäinen arvo on tyyppiä "date" sisältää tämä sarake tämän tiedon. Alkuperäinen aikaleima on epoch-muodossa mutta tähän se on käännetty aikaleimaksi
        data_type: timestamp with time zone
      - name: arvo
        description: Jos sisäinen arvo on tyyppiä "value", niin tässä sarakkeessa on sen avaimen arvo
        data_type: text
      - name: aikaleima_alkaa
        description: jos sisäisessä arvossa on startdate ja enddate, niin tässä sarakkeessa on startdate aikaleimana
        data_type: timestamp with time zone
      - name: aikaleima_paattyy
        description: jos sisäisessä arvossa on startdate ja enddate, niin tässä sarakkeessa on enddate aikaleimana
        data_type: timestamp with time zone
